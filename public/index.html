<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>WoL</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <div class="container">

    <!-- Setup View -->
    <div id="view-setup" class="view">
      <div class="card">
        <h1>Welcome to WoL</h1>
        <h2>Create your admin account</h2>
        <div id="setup-error" class="alert alert-error" style="display:none"></div>
        <form id="setup-form">
          <div class="form-group">
            <label for="setup-username">Username</label>
            <input type="text" id="setup-username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="setup-password">Password (min 8 characters)</label>
            <input type="password" id="setup-password" minlength="8" autocomplete="new-password" required>
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
      </div>
    </div>

    <!-- Login View -->
    <div id="view-login" class="view">
      <div class="card">
        <h1>WoL</h1>
        <h2>Sign in to continue</h2>
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <button id="webauthn-login-btn" class="btn btn-ghost mt-16" style="display:none">
          Sign in with Biometrics
        </button>
      </div>
    </div>

    <!-- App View -->
    <div id="view-app" class="view">
      <div class="nav">
        <span class="nav-title">WoL</span>
        <div class="nav-actions">
          <button id="btn-settings" class="btn btn-ghost btn-sm">Settings</button>
          <button id="btn-logout" class="btn btn-ghost btn-sm">Logout</button>
        </div>
      </div>

      <div id="install-banner" class="install-banner">
        Install WoL App
      </div>

      <div class="card">
        <div class="device-select">
          <select id="target-select"></select>
        </div>
        <div class="wake-container">
          <button id="wake-btn" class="wake-btn" aria-label="Wake">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
              <line x1="12" y1="2" x2="12" y2="12"/>
            </svg>
          </button>
          <div id="wake-status" class="wake-status"></div>
        </div>
      </div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view">
      <div class="nav">
        <span class="nav-title">Settings</span>
        <button id="btn-back" class="btn btn-ghost btn-sm">Back</button>
      </div>

      <div class="card section">
        <div class="section-title">Biometric Authentication</div>
        <p class="text-sm text-muted" style="margin-bottom:12px">Register a fingerprint or face for quick sign-in.</p>
        <div id="biometric-status"></div>
        <button id="btn-register-biometric" class="btn btn-primary">Register Biometric</button>
      </div>

      <div class="card section">
        <div class="section-title">API Tokens</div>
        <p class="text-sm text-muted" style="margin-bottom:12px">Personal access tokens for API use.</p>
        <div id="new-token-reveal" class="token-reveal" style="display:none"></div>
        <div class="form-group" style="display:flex;gap:8px">
          <input type="text" id="token-name" placeholder="Token name">
          <button id="btn-create-token" class="btn btn-primary btn-sm" style="white-space:nowrap">Generate</button>
        </div>
        <ul id="token-list" class="token-list"></ul>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/@simplewebauthn/browser@11/dist/bundle/index.umd.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/wake.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
